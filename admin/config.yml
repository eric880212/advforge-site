backend:
  name: github
  repo: eric880212/advforge-site
  branch: main

media_folder: images
public_folder: /images

locale: zh-Hant

collections:
  - name: site
    label: 網站內容
    files:
      - name: home
        label: 首頁與聯絡資訊
        file: content/site.json
        fields:
          - name: hero
            label: 首頁主視覺
            widget: object
            fields:
              - { name: title, label: 公司名稱, widget: string }
              - { name: title_en, label: 英文公司名, widget: string }
              - { name: p1, label: 段落一, widget: text }
              - { name: p2, label: 段落二, widget: text }
              - { name: p3, label: 段落三, widget: text }
          - name: about
            label: 關於宜德
            widget: object
            fields:
              - { name: title, label: 區塊標題, widget: string }
              - { name: motto, label: 標語（一行一句）, widget: text }
          - name: trust
            label: 頁尾信賴區塊
            widget: object
            fields:
              - { name: heading, label: 標題, widget: string }
              - { name: p1, label: 段落一, widget: text }
              - { name: p2, label: 段落二, widget: text }
              - { name: p3, label: 段落三, widget: text }
          - name: contact
            label: 聯絡資訊
            widget: object
            fields:
              - { name: company, label: 公司名稱, widget: string }
              - { name: phone, label: 電話, widget: string }
              - { name: fax, label: 傳真, widget: string }
              - { name: email, label: Email, widget: string }
              - { name: taxid, label: 統一編號, widget: string }
              - { name: address, label: 地址, widget: string }
